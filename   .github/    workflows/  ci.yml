name: Rust Case Studies CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify ${{ matrix.project.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - name: axum-api-case-study
            path: case-studies/axum-api-case-study
          - name: secure-file-scanner
            path: case-studies/secure-file-scanner
          - name: async-worker-bounded-queue
            path: case-studies/async-worker-bounded-queue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Show Rust versions
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        working-directory: ${{ matrix.project.path }}
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: ${{ matrix.project.path }}
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ${{ matrix.project.path }}
        run: cargo test